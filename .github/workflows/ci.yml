name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend tests ────────────────────────────────────────
  backend-test:
    name: Django Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run migrations
        run: |
          cd backend
          python manage.py migrate --run-syncdb

      - name: Run tests
        run: |
          cd backend
          python manage.py test submissions --verbosity=2

      - name: Check for missing migrations
        run: |
          cd backend
          python manage.py makemigrations --check --dry-run

  # ─── Frontend build ───────────────────────────────────────
  frontend-build:
    name: React Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps

      - name: Build
        run: |
          cd frontend
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

  # ─── Docker build check ───────────────────────────────────
  docker-check:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t pylearn-backend ./backend

      - name: Build frontend image
        run: docker build -t pylearn-frontend ./frontend

  # ─── Deploy to production (on main only) ──────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [docker-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pylearn-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pylearn-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pylearn-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pylearn-frontend:${{ github.sha }}

      # Add your deployment step here — e.g. SSH to server, ECS update, etc.
