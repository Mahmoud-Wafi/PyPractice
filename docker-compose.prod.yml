version: '3.9'

# Production docker-compose
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_static:/staticfiles:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro       # place your certs here
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       pylearn
      POSTGRES_USER:     pylearn
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pylearn"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    image: ${DOCKERHUB_USERNAME}/pylearn-backend:${TAG:-latest}
    environment:
      DEBUG:              "False"
      SECRET_KEY:         ${SECRET_KEY}
      DATABASE_URL:       postgresql://pylearn:${DB_PASSWORD}@db:5432/pylearn
      REDIS_URL:          redis://redis:6379/0
      ALLOWED_HOSTS:      ${ALLOWED_HOSTS}
      CORS_ORIGINS:       ${CORS_ORIGINS}
      OPENAI_API_KEY:     ${OPENAI_API_KEY}
      AI_MODEL:           gpt-3.5-turbo
    volumes:
      - backend_static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application
               --bind 0.0.0.0:8000
               --workers 4
               --timeout 30
               --max-requests 1000
               --max-requests-jitter 100
               --access-logfile -"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/levels/')"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery:
    image: ${DOCKERHUB_USERNAME}/pylearn-backend:${TAG:-latest}
    environment:
      DEBUG:          "False"
      SECRET_KEY:     ${SECRET_KEY}
      DATABASE_URL:   postgresql://pylearn:${DB_PASSWORD}@db:5432/pylearn
      REDIS_URL:      redis://redis:6379/0
    depends_on:
      - backend
      - redis
    command: celery -A config worker -l warning -c 4 --max-tasks-per-child 100
    restart: unless-stopped

  frontend:
    image: ${DOCKERHUB_USERNAME}/pylearn-frontend:${TAG:-latest}
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_static:
