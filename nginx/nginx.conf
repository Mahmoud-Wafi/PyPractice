# ── Rate limiting zones ───────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;
limit_req_zone $binary_remote_addr zone=execute:10m rate=20r/m;

upstream django  { server backend:8000;  }
upstream react   { server frontend:80;   }

server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options          "DENY"              always;
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header X-XSS-Protection         "1; mode=block"     always;
    add_header Referrer-Policy          "strict-origin"     always;
    add_header Permissions-Policy       "camera=(), microphone=()" always;

    client_max_body_size 1m;

    # ── Auth (strict rate limit) ──────────────────────────────
    location ~ ^/api/auth/(login|register)/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Code execution ────────────────────────────────────────
    location ~ ^/api/(submit|run)/ {
        limit_req zone=execute burst=10 nodelay;
        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 35s;
    }

    # ── General API ───────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 30s;
    }

    # ── Admin ─────────────────────────────────────────────────
    location /admin/ {
        proxy_pass        http://django;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
    }

    # ── Django static (collected) ─────────────────────────────
    location /static/ {
        alias /staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── React SPA (everything else) ───────────────────────────
    location / {
        proxy_pass         http://react;
        proxy_set_header   Host $host;
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}
